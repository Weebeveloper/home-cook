<div class="sheet-container" cdkDrag cdkDragLockAxis="y" (cdkDragEnded)="onSheetDragEnd($event)">
  <div class="drag-handle" cdkDragHandle>
    <div class="nudge"></div>
  </div>

  <section class="content">
    <div class="content-title">מצרכים:</div>

    <ul>
      @for (ingredient of ingredients; track $index) {
        <li>{{ ingredient.ingredientAmount }} {{ ingredient.ingredientName }}</li>
      }
    </ul>
  </section>
</div>
